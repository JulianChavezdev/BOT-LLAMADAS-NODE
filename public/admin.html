<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bistro Nube</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">
    <header class="border-b border-slate-800 bg-slate-900">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-semibold">Bistro Nube</h1>
                <p class="text-sm text-slate-400">Panel admin demo</p>
            </div>
            <a href="/cocina" class="text-sm bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded">Cocina</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-5 py-6 space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4" id="stats"></section>

        <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="xl:col-span-1 bg-slate-900 border border-slate-800 rounded-lg p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400 mb-3">Negocio</h2>
                <div id="business" class="space-y-2 text-sm"></div>
            </div>

            <div class="xl:col-span-2 bg-slate-900 border border-slate-800 rounded-lg p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400 mb-3">Menu</h2>
                <form id="menu-form" class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-4">
                    <input name="name" required placeholder="Producto" class="bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm md:col-span-1">
                    <input name="category" required placeholder="Categoria" class="bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm md:col-span-1">
                    <input name="price" required type="number" min="0" step="0.01" placeholder="Precio" class="bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm md:col-span-1">
                    <input name="description" placeholder="Descripcion" class="bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm md:col-span-1">
                    <button class="bg-emerald-600 hover:bg-emerald-500 rounded px-3 py-2 text-sm font-medium">Agregar</button>
                </form>
                <div id="menu" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </section>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400 mb-3">Pedidos</h2>
                <div id="orders" class="space-y-3"></div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
                <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400 mb-3">Llamadas</h2>
                <div id="calls" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script>
        const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
        let menuItemsCache = [];

        async function fetchJson(url, options) {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, character => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[character]);
        }

        function stat(label, value) {
            return `
                <article class="bg-slate-900 border border-slate-800 rounded-lg p-4">
                    <p class="text-xs uppercase tracking-wide text-slate-500">${escapeHtml(label)}</p>
                    <p class="mt-2 text-2xl font-semibold">${escapeHtml(value)}</p>
                </article>
            `;
        }

        function renderBusiness(business) {
            document.getElementById('business').innerHTML = `
                <p><span class="text-slate-500">ID:</span> ${escapeHtml(business.id)}</p>
                <p><span class="text-slate-500">Nombre:</span> ${escapeHtml(business.name)}</p>
                <p><span class="text-slate-500">Ciudad:</span> ${escapeHtml(business.city)}</p>
                <p><span class="text-slate-500">Zona horaria:</span> ${escapeHtml(business.timezone)}</p>
                <p><span class="text-slate-500">Modo:</span> ${escapeHtml(business.serviceMode)}</p>
                <p><span class="text-slate-500">Voz:</span> ${escapeHtml(business.voice.deepgramSpeakModel)}</p>
            `;
        }

        function renderMenu(items) {
            menuItemsCache = items;
            const html = items.map(item => `
                    <article class="border border-slate-800 rounded-lg p-3">
                        <div class="flex justify-between gap-3">
                            <h3 class="font-medium">${escapeHtml(item.name)}</h3>
                            <span class="text-emerald-400">${money.format(item.price)}</span>
                        </div>
                        <p class="text-xs uppercase tracking-wide text-slate-500 mt-1">${escapeHtml(item.category)}</p>
                        <p class="text-sm text-slate-400 mt-2">${escapeHtml(item.description)}</p>
                        <div class="mt-3 flex flex-wrap gap-2">
                            <button data-menu-action="availability" data-menu-id="${escapeHtml(item.id)}" data-available="${!item.available}" class="text-xs px-2 py-1 rounded ${item.available ? 'bg-emerald-700 hover:bg-emerald-600' : 'bg-slate-700 hover:bg-slate-600'}">
                                ${item.available ? 'Disponible' : 'No disponible'}
                            </button>
                            <button data-menu-action="edit" data-menu-id="${escapeHtml(item.id)}" class="text-xs px-2 py-1 rounded bg-slate-800 hover:bg-slate-700">Editar</button>
                            <button data-menu-action="delete" data-menu-id="${escapeHtml(item.id)}" class="text-xs px-2 py-1 rounded bg-red-900 hover:bg-red-800">Eliminar</button>
                        </div>
                    </article>
                `).join('');

            document.getElementById('menu').innerHTML = html || '<p class="text-slate-500">Sin productos.</p>';

            document.querySelectorAll('[data-menu-action="availability"]').forEach(button => {
                button.addEventListener('click', async () => {
                    button.disabled = true;
                    const response = await fetch(`/api/menu-items/${encodeURIComponent(button.dataset.menuId)}/availability`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ available: button.dataset.available === 'true' })
                    });
                    if (!response.ok) throw new Error('No se pudo actualizar el producto');
                    load();
                });
            });

            document.querySelectorAll('[data-menu-action="edit"]').forEach(button => {
                button.addEventListener('click', async () => {
                    const item = menuItemsCache.find(menuItem => menuItem.id === button.dataset.menuId);
                    if (!item) return;

                    const name = prompt('Producto', item.name);
                    if (name === null) return;
                    const category = prompt('Categoria', item.category);
                    if (category === null) return;
                    const price = prompt('Precio', item.price);
                    if (price === null) return;
                    const description = prompt('Descripcion', item.description || '');
                    if (description === null) return;

                    await fetchJson(`/api/menu-items/${encodeURIComponent(item.id)}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, category, price, description })
                    });
                    load();
                });
            });

            document.querySelectorAll('[data-menu-action="delete"]').forEach(button => {
                button.addEventListener('click', async () => {
                    const item = menuItemsCache.find(menuItem => menuItem.id === button.dataset.menuId);
                    if (!item || !confirm(`Eliminar ${item.name}?`)) return;

                    const response = await fetch(`/api/menu-items/${encodeURIComponent(item.id)}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) throw new Error('No se pudo eliminar el producto');
                    load();
                });
            });
        }

        function renderOrders(orders) {
            document.getElementById('orders').innerHTML = orders.map(order => `
                <article class="border border-slate-800 rounded-lg p-3">
                    <div class="flex justify-between gap-3">
                        <h3 class="font-medium">${escapeHtml(order.customerName)}</h3>
                        <span class="text-xs px-2 py-1 rounded bg-slate-800">${escapeHtml(order.status)}</span>
                    </div>
                    <p class="text-sm text-slate-400 mt-2">${escapeHtml(order.summary)}</p>
                    <p class="text-sm mt-2 text-emerald-400">${order.total == null ? '' : money.format(order.total)}</p>
                </article>
            `).join('') || '<p class="text-slate-500">Sin pedidos registrados.</p>';
        }

        function renderCalls(calls) {
            document.getElementById('calls').innerHTML = calls.map(call => `
                <article class="border border-slate-800 rounded-lg p-3">
                    <div class="flex justify-between gap-3">
                        <h3 class="font-mono text-sm">${escapeHtml(call.id)}</h3>
                        <span class="text-xs px-2 py-1 rounded bg-slate-800">${escapeHtml(call.status)}</span>
                    </div>
                    <p class="text-sm text-slate-400 mt-2">${escapeHtml(call.phone || 'Sin telefono')}</p>
                    <p class="text-xs text-slate-500 mt-2">${escapeHtml(call.startedAt || '')}</p>
                </article>
            `).join('') || '<p class="text-slate-500">Sin llamadas registradas.</p>';
        }

        async function load() {
            const [business, menuItems, orders, calls] = await Promise.all([
                fetchJson('/api/business'),
                fetchJson('/api/menu-items'),
                fetchJson('/api/pedidos/todos'),
                fetchJson('/api/llamadas')
            ]);

            document.getElementById('stats').innerHTML = [
                stat('Pedidos', orders.length),
                stat('Pendientes', orders.filter(order => order.status === 'pending').length),
                stat('Llamadas', calls.length),
                stat('Productos', menuItems.length)
            ].join('');

            renderBusiness(business);
            renderMenu(menuItems);
            renderOrders(orders);
            renderCalls(calls);
        }

        load().catch(error => {
            console.error(error);
            document.body.insertAdjacentHTML('beforeend', '<p class="p-5 text-red-400">Error cargando panel admin.</p>');
        });

        document.getElementById('menu-form').addEventListener('submit', async event => {
            event.preventDefault();
            const form = event.currentTarget;
            const formData = new FormData(form);

            await fetchJson('/api/menu-items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: formData.get('name'),
                    category: formData.get('category'),
                    price: formData.get('price'),
                    description: formData.get('description')
                })
            });

            form.reset();
            load();
        });
    </script>
</body>
</html>
